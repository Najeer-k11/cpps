name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    check:
        name: Check (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
        steps:
            - uses: actions/checkout@v4

            - name: Install Rust
              uses: dtolnay/rust-toolchain@stable
              with:
                  components: clippy, rustfmt

            - name: Cache cargo registry
              uses: actions/cache@v4
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

            - name: Check formatting
              run: cargo fmt --check

            - name: Clippy
              run: cargo clippy -- -D warnings

            - name: Build
              run: cargo build

            - name: Test CLI basics
              shell: bash
              run: |
                  ./target/debug/cpps --version
                  ./target/debug/cpps --help
                  ./target/debug/cpps new test-project
                  test -f test-project/cpps.toml
                  test -f test-project/src/main.cpp
                  rm -rf test-project
